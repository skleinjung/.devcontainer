services:
  workspace:
    build:
      args:
        USERNAME: '${USER}'
      context: .
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 6g
    # reap-vscode-sockets: reaps VS Code's CLI/git IPC sockets, then runs
    # `command`. Requires devcontainer.json overrideCommand:false so VS Code keeps it.
    entrypoint: ['/usr/local/bin/reap-vscode-sockets']
    command: ['sleep', 'infinity']
    # Bridge networking (NOT network_mode/ipc: host) so the workspace doesn't share the
    # host's network/IPC namespaces. host.docker.internal reaches host services;
    # workspace:127.0.0.1 keeps the container hostname resolvable.
    extra_hosts:
      - 'host.docker.internal:host-gateway'
      - 'workspace:127.0.0.1'
    hostname: workspace
    shm_size: 1g
    # Untrusted-code hardening: drop all Linux capabilities and block setuid escalation
    # (base already removes sudo). Add a specific cap back only if a tool genuinely needs it.
    cap_drop:
      - ALL
    security_opt:
      - 'no-new-privileges:true'
    volumes:
      - ..:/workspace:cached
      - ${HOME}/.bash_history:/home/${USER}/.bash_history:cached
      - ${HOME}/.claude:/home/${USER}/.claude:cached
      - ${HOME}/.claude.json:/home/${USER}/.claude.json:cached
      # commit-signing key only, read-only — NOT the whole ~/.ssh.
      - ${HOME}/.ssh/id_ed25519:/home/${USER}/.ssh/id_ed25519:ro
      - ${HOME}/.ssh/id_ed25519.pub:/home/${USER}/.ssh/id_ed25519.pub:ro
      # The credentials shelf: the sidecars vend narrow, short-lived credentials here; the
      # workspace (agents included) can only read them. base's devcred/git/gh/aws shims read it.
      - creds-shelf:/creds:ro

  # ── credential sidecar (toolkit image) — vends AWS + GitHub to the read-only shelf ──────
  # One image, N loops (AWS + per-installation GitHub), driven by creds/vend.yaml. admin-home
  # (the SSO session + kms:Sign) is mounted into NO consumer. Log in from a HOST terminal:
  #   docker exec -it <project>-credentials-1 refresh-credentials

  credentials:
    # Derived image that bakes creds/vend.yaml (what to vend) — a reviewed rebuild, not a
    # /workspace bind-mount. On start it renders the shared ~/.aws/config from vend.yaml and
    # runs an AWS loop + one GitHub loop per installation.
    build: ./creds
    init: true
    restart: unless-stopped
    environment:
      # No reachable localhost callback in here (bridge net) — use the SSO device-code flow.
      AWS_SSO_USE_DEVICE_CODE: '1'
    volumes:
      - admin-home:/home/credential-vendor
      - creds-shelf:/creds

volumes:
  # Written only by the credential sidecar; read-only in the workspace.
  creds-shelf:
  # The sidecar's $HOME (SSO cache + ~/.aws). Never mounted into the workspace.
  admin-home:
