# Roles this sidecar vends to the shelf. One entry per role; the FIRST also becomes the
# shelf's [default]. Only account_id and role are required (name defaults to
# <account_id>-<role>; region to VEND_AWS_SSO_REGION; vend to true). generate-aws-config
# renders these into the shared ~/.aws/config at container start.
profiles:
  # The agent role — vended to the shelf as the [default]. Its name defaults to
  # 084828575849-developer-ai-agent (consumers can also select it with AWS_PROFILE).
  - account_id: "084828575849"
    role: developer-ai-agent

  # The github sidecar's kms:Sign role. It reads this from the shared ~/.aws/config, so it
  # must be listed here — but with vend: false it stays OFF the shelf, so the kms:Sign
  # capability never reaches the workspace. Its name must match credentials-github's
  # VEND_GH_AWS_PROFILE (the default <account_id>-<role> already does).
  # TEMPORARY: a shelf-era stopgap. Once per-container vending lands (the broker), this role
  # is vended straight to the github sidecar and nowhere else, and vend: false goes away.
  - account_id: "253490790167"
    role: developer-tool-user
    vend: false
